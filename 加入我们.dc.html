<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/mycelium-tokens.css">
<script src="auth-nav.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--mp-font-sans); color: var(--mp-fg-1); background: var(--mp-gray-50); -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(157,134,240,0.22); }
  .nav-link:hover { color: #fff !important; }
  .nav-logo:hover { opacity: .82; }
  .crumb:hover { color: #c4b6ff !important; }
  .role-card:hover { transform: translateY(-3px); box-shadow: var(--mp-shadow-button); }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: var(--mp-shadow-button); }
</style>
</helmet>

<div style="min-height:100vh;background:var(--mp-gray-50);">
  <nav style="position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:10px clamp(20px,5vw,60px);background:rgba(18,14,43,0.9);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.12);">
    <a href="数字游民社区集合网.dc.html" class="nav-logo" style="display:flex;align-items:center;gap:11px;text-decoration:none;transition:opacity var(--mp-dur-base) var(--mp-ease);">
      <img src="assets/mushroom-logo.png" alt="" style="width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));">
      <div style="font-size:18px;font-weight:800;color:#fff;letter-spacing:0.2px;">Next Stop</div>
    </a>
    <div style="display:flex;align-items:center;gap:28px;">
      <a href="数字游民社区集合网.dc.html" class="nav-link" style="color:rgba(255,255,255,0.82);text-decoration:none;font-size:14px;font-weight:500;transition:color var(--mp-dur-base) var(--mp-ease);">发现社区</a>
      <a href="活动.dc.html" class="nav-link" style="color:rgba(255,255,255,0.82);text-decoration:none;font-size:14px;font-weight:500;transition:color var(--mp-dur-base) var(--mp-ease);">活动</a>
      <a href="指南.dc.html" class="nav-link" style="color:rgba(255,255,255,0.82);text-decoration:none;font-size:14px;font-weight:500;transition:color var(--mp-dur-base) var(--mp-ease);">指南</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
    <a href="社区入驻.dc.html" class="cta-btn" style="padding:7px 14px;background:#fff;color:var(--mp-purple-700);text-decoration:none;border-radius:var(--mp-radius-pill);font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,0.18);transition:all var(--mp-dur-base) var(--mp-ease);">提交社区</a>
    </div>
  </nav>

  <header style="position:relative;background:linear-gradient(158deg,#171232 0%,#3a2470 60%,#5b3fb0 120%);padding:clamp(40px,5vw,64px) clamp(20px,5vw,60px);overflow:hidden;">
    <div style="position:absolute;top:-30%;right:0;width:55%;height:170%;background:radial-gradient(circle,rgba(157,134,240,0.4) 0%,transparent 62%);pointer-events:none;"></div>
    <div style="position:relative;max-width:900px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:8px;font-family:var(--mp-font-mono);font-size:12.5px;color:rgba(255,255,255,0.6);margin-bottom:16px;">
        <a href="数字游民社区集合网.dc.html" class="crumb" style="color:rgba(255,255,255,0.6);text-decoration:none;">首页</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg>
        <span style="color:#c4b6ff;">加入我们</span>
      </div>
      <h1 style="font-family:var(--mp-font-display);font-size:clamp(30px,4.4vw,48px);font-weight:800;color:#fff;line-height:1.08;letter-spacing:-1px;margin:0 0 14px;">和我们一起，把散落的社区连成一张网</h1>
      <p style="font-size:clamp(15px,1.5vw,18px);font-weight:300;line-height:1.6;color:rgba(255,255,255,0.85);margin:0;max-width:620px;">Next Stop 是一支远程优先的小团队，服务全国数字游民社区与线下基地。我们相信真实的数据、真实的连接，也在寻找同样相信的人。</p>
    </div>
  </header>

  <main style="max-width:900px;margin:0 auto;padding:clamp(32px,4vw,52px) clamp(20px,5vw,60px) clamp(48px,6vw,80px);display:flex;flex-direction:column;gap:36px;">
    <section>
      <h2 style="font-size:22px;font-weight:800;color:var(--mp-gray-900);margin:0 0 16px;letter-spacing:-0.3px;border:0;padding:0;">我们提供什么</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;">
        <sc-for list="{{ perks }}" as="p" hint-placeholder-count="4">
          <div style="background:#fff;border-radius:16px;box-shadow:var(--mp-shadow-card);padding:18px 20px;">
            <div style="width:38px;height:38px;border-radius:11px;background:{{ p.bg }};display:flex;align-items:center;justify-content:center;margin-bottom:11px;">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="{{ p.color }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="{{ p.icon }}"></use></svg>
            </div>
            <div style="font-size:15px;font-weight:800;color:var(--mp-gray-900);margin-bottom:5px;">{{ p.title }}</div>
            <div style="font-size:13px;line-height:1.6;color:var(--mp-gray-600);">{{ p.body }}</div>
          </div>
        </sc-for>
      </div>
    </section>

    <section>
      <h2 style="font-size:22px;font-weight:800;color:var(--mp-gray-900);margin:0 0 16px;letter-spacing:-0.3px;border:0;padding:0;">开放岗位</h2>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <sc-for list="{{ roles }}" as="r" hint-placeholder-count="4">
          <div class="role-card" style="display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border-radius:16px;box-shadow:var(--mp-shadow-card);padding:18px 22px;transition:all var(--mp-dur-base) var(--mp-ease);">
            <div style="min-width:0;">
              <div style="font-size:15.5px;font-weight:800;color:var(--mp-gray-900);">{{ r.title }}</div>
              <div style="font-size:13px;color:var(--mp-gray-500);margin-top:4px;">{{ r.meta }}</div>
            </div>
            <a href="mailto:clestons@sina.com" class="cta-btn" style="flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--mp-purple-700);color:#fff;text-decoration:none;border-radius:var(--mp-radius-pill);font-size:13px;font-weight:700;transition:all var(--mp-dur-base) var(--mp-ease);">投递
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </a>
          </div>
        </sc-for>
      </div>
    </section>

    <section style="background:linear-gradient(150deg,#2c2060,#5b3fb0);border-radius:var(--mp-radius-lg);box-shadow:var(--mp-shadow-card);padding:clamp(24px,3vw,36px);text-align:center;">
      <h2 style="font-size:22px;font-weight:800;color:#fff;margin:0 0 8px;letter-spacing:-0.3px;border:0;padding:0;">没有合适的岗位？</h2>
      <p style="font-size:14.5px;line-height:1.6;color:rgba(255,255,255,0.85);margin:0 0 20px;">我们始终欢迎热爱数字游民文化的伙伴。把你的想法与作品发给我们。</p>
      <a href="mailto:clestons@sina.com" class="cta-btn" style="display:inline-flex;align-items:center;gap:7px;padding:12px 26px;background:#fff;color:var(--mp-purple-700);text-decoration:none;border-radius:var(--mp-radius-pill);font-size:14.5px;font-weight:700;transition:all var(--mp-dur-base) var(--mp-ease);">clestons@sina.com</a>
    </section>
  </main>

  <svg width="0" height="0" style="position:absolute;" aria-hidden="true"><defs>
    <symbol id="ji-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></symbol>
    <symbol id="ji-users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path></symbol>
    <symbol id="ji-spark" viewBox="0 0 24 24"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"></path></symbol>
    <symbol id="ji-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="M9 22V12h6v10"></path></symbol>
  </defs></svg>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const perks = [
      { icon: '#ji-home', title: '远程优先', body: '在任何一个 Next Stop 基地办公，我们报销工位与差旅。', bg: 'rgba(157,134,240,0.14)', color: 'var(--mp-purple-700)' },
      { icon: '#ji-users', title: '真实社区', body: '与全国各地的社区主理人共事，走进真实的线下空间。', bg: 'rgba(47,125,106,0.12)', color: '#2f7d6a' },
      { icon: '#ji-spark', title: '小而自主', body: '扁平团队，你的想法能快速落地上线，被真实用户使用。', bg: 'rgba(245,166,35,0.16)', color: '#c9971f' },
      { icon: '#ji-globe', title: '游牧友好', body: '弹性工作时间，鼓励边旅居边工作，把生活过成产品。', bg: 'rgba(42,111,219,0.1)', color: 'var(--mp-action)' }
    ];
    const roles = [
      { title: '社区运营（远程）', meta: '全职 · 远程 · 数字游民社区方向' },
      { title: '内容与城市编辑', meta: '全职 / 兼职 · 远程 · 负责城市与社区内容' },
      { title: '前端工程师', meta: '全职 · 远程 · Web / 交互' },
      { title: '城市合伙人', meta: '兼职 · 各地 · 拓展与维护本地社区' }
    ];
    return { perks, roles };
  }
}
</script>
</body>
</html>
